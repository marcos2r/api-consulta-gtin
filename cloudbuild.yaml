steps:
  # 1. Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/api-consulta-gtin:$COMMIT_SHA', '.']

  # 2. Push da imagem Docker para o Google Container Registry / Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api-consulta-gtin:$COMMIT_SHA']

  # 3. Deploy no Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'api-consulta-gtin'
      - '--image'
      - 'gcr.io/$PROJECT_ID/api-consulta-gtin:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--set-secrets'
      - 'CERTIFICADO_BASE64=cert_base64:latest' # Exemplo de injeção via Secret Manager
      # As variáveis não secretas podem ser adicionadas com --set-env-vars
      # - '--set-env-vars'
      # - 'AMBIENTE=producao,REDIS_URL=redis://IP:6379/0'

images:
  - 'gcr.io/$PROJECT_ID/api-consulta-gtin:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
